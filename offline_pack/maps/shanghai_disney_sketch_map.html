<body> <div class="wrap"> <div class="top"> <h1>상하이 디즈니 그림 지도 동선 (중년 부부 체력보존형)</h1> <p class="desc">한국어 존맵 이미지를 기준으로 동선을 겹쳐 보는 그림 버전입니다. 버튼으로 루트를 바꿔 보고 번호 순서대로 이동하면 됩니다.</p> <div class="nav-switch"> <a href="../START_HERE.html" aria-label="메인으로">&lt;</a> <a href="./shanghai_disney_live_map.html">실제 지도 보기</a> <a class="active" href="./shanghai_disney_sketch_map.html">그림 지도 보기</a> <a href="./shanghai_disney_calibration_map.html">실제지도 매칭</a> </div> <div class="route-row"> <div class="tools"> <button id="btnA" class="routeA active">A안 동선 (일루미네이션 본다)</button> <button id="btnB" class="routeB">B안 동선 (일루미네이션 안 본다)</button> </div> <div class="legend"> <span><i class="dot" style="background:#0f766e"></i>A안 동선</span> <span><i class="dot" style="background:#b45309"></i>B안 동선</span> <span><i class="dot" style="background:#111827"></i>번호 순서</span> </div> <div class="road-tools"> <button id="roadDeleteSelected" class="danger-mini" style="display:none">선택 길 삭제</button> <button id="roadSelectToggle" class="switch-btn" aria-pressed="false"><span class="switch-knob"></span><span>길 선택 모드</span></button> </div> </div> </div> <div class="grid"> <div class="card map-card"> <svg id="board" viewBox="0 0 920 740" aria-label="그림 지도"></svg> </div> <aside class="card side"> <h2>루트 요약</h2> <div id="metric" class="metric">계산 중...</div> <ul id="steps" class="steps"></ul> </aside> </div> </div> <script> const CALIBRATION_PIN_KEY='shanghai_disney_calibration_pins_v1'; const ROAD_KEY='shanghai_disney_calibration_roads_v1'; const SKETCH_ROADS_KEY='shanghai_disney_sketch_roads_v1'; const SKETCH_PIN_OFFSETS_KEY='shanghai_disney_sketch_pin_offsets_v1'; const USE_KOREAN_ZONE_MAP=true; const KOREAN_ZONE_MAP_SRC='../zone-map-korean.png'; const FIXED_MATCH={stretchX:1.21,stretchY:1.20,baseX:44,baseY:72,overlayX:-24,overlayY:-20}; const ROAD_OVERLAY_SHIFT_X=-28; const ROAD_OVERLAY_SHIFT_Y=-10; const VIEW_DEFAULT={x:0,y:0,w:920,h:740}; let viewBoxState={...VIEW_DEFAULT}; let zoomPanBound=false; let initialCast abel:'15:40 트론'}, {key:'MAV',label:'20:20 미키 애비뉴 쇼핑/휴식'}, {key:'WOD',label:'21:35 디즈니타운 추가 쇼핑'} ]; const walkLegs={ 'ENT>CAST':[[31.14602,121.65930],[31.14535,121.65995],[31.14490,121.66022]], 'CAST>PIR':[[31.14500,121.65995],[31.14500,121.65918],[31.14494,121.65882]], 'PIR>DBL':[[31.14495,121.65882]], 'DBL>ZOO':[[31.14506,121.65920],[31.14490,121.66022],[31.14440,121.66062],[31.14386,121.66096]], 'ZOO>FFR':[[31.14374,121.66096]], 'FFR>TRN':[[31.14395,121.66096],[31.14472,121.66120],[31.14512,121.66166]], 'TRN>IGI':[[31.14530,121.66182]], 'IGI>LFF':[[31.14502,121.66128],[31.14488,121.66070]], 'LFF>ENT':[[31.14488,121.66022],[31.14535,121.65995],[31.14602,121.65930]], 'ENT>PIR':[[31.14602,121.65930],[31.14518,121.65918],[31.14494,121.65882]], 'PIR>ZOO':[[31.14502,121.65916],[31.14490,121.66022],[31.14440,121.66062],[31.14386,121.66096]], 'ZOO>TRN':[[31.14386,121.66096],[31.14472,121.66120],[31.14512,121.66166]], 'TRN>MAV':[[31.14512,121.66166],[31.14535,121.65995],[31.14602,121.65930]], 'MAV>WOD':[[31.14645,121.65900],[31.14682,121.65828]] }; const defaultRoads=[ [[31.14645,121.65892],[31.14610,121.65920],[31.14535,121.65995],[31.14490,121.66022],[31.14440,121.66062],[31.14386,121.66096]], [[31.14490,121.66022],[31.14500,121.65995],[31.14500,121.65918],[31.14494,121.65882],[31.14485,121.65860]], [[31.14512,121.66166],[31.14472,121.66120],[31.14395,121.66096]], [[31.14512,121.66166],[31.14530,121.66182],[31.14552,121.66163]], [[31.14535,121.65995],[31.14602,121.65930],[31.14645,121.65900],[31.14682,121.65828],[31.14695,121.65770]], [[31.14582,121.66272],[31.14550,121.66220],[31.14512,121.66166]], [[31.14466,121.66020],[31.14474,121.66032],[31.14502,121.66128],[31.14512,121.66166]] ]; function sanitizeRoads(v){ if(!Array.isArray(v)) return []; return v .filter((r)=>Array.isArray(r)&&r.length>=2) .map((r)=>r.map((p)=>[Number(p[0]),Number(p[1])]).filter((p)=>Number.isFinite(p[0])&&Number.isFinite(p[1]))) .filter((r)=>r.length>=2); } const loadedRoads=sanitizeRoads((()=>{ try{ return JSON.parse(localStorage.getItem(ROAD_KEY)||'[]'); }catch(_){ return []; } })()); let parkRoads=sanitizeRoads((()=>{ try{ return JSON.parse(localStorage.getItem(SKETCH_ROADS_KEY)||'[]'); }catch(_){ return []; } })()); if(!parkRoads.length) parkRoads=(loadedRoads.length?loadedRoads:defaultRoads).map((r)=>r.map((p)=>[p[0],p[1]])); let pinOffsets={}; try{ const raw=JSON.parse(localStorage.getItem(SKETCH_PIN_OFFSETS_KEY)||'{}'); if(raw && typeof raw==='object') pinOffsets=raw; }catch(_){ pinOffsets={}; } let roadSelectMode=false; let selectedRoadIdx=-1; function syncRoadDeleteButton(){ const btn=document.getElementById('roadDeleteSelected'); btn.style.display=(selectedRoadIdx>=0&&selectedRoadIdx<parkRoads.length)?'inline-block':'none'; } function saveSketchRoads(){ localStorage.setItem(SKETCH_ROADS_KEY,JSON.stringify(parkRoads)); } function legPolyline(aKey,bKey){ const ab=`${aKey}>${bKey}`; const ba=`${bKey}>${aKey}`; if(walkLegs[ab]) return walkLegs[ab].slice(); if(walkLegs[ba]) return walkLegs[ba].slice().reverse(); return []; } function buildWalkPolyline(route){ const out=[]; route.forEach((r,i)=>{ const p=points[r.key]; if(i===0){ out.push({lat:p.lat,lng:p.lng}); return; } const prev=route[i-1]; legPolyline(prev.key,r.key).forEach((m)=>out.push({lat:m[0],lng:m[1]})); out.push({lat:p.lat,lng:p.lng}); }); return out; } function scale(){
 const zoneDefs=buildZoneDefs(); const inParkVals=Object.entries(points).filter(([id])=>id!=='WSL').map(([,p])=>p); const vals=[...inParkVals,...zoneDefs.map(z=>({lat:z.lat,lng:z.lng}))]; const R=6378137; const toMeters=(p)=>({ x:R*(p.lng*Math.PI/180), y:R*Math.log(Math.tan(Math.PI/4 + (p.lat*Math.PI/180)/2)) }); const meterVals=vals.map(toMeters); const minX=Math.min(...meterVals.map(v=>v.x)), maxX=Math.max(...meterVals.map(v=>v.x)); const minY=Math.min(...meterVals.map(v=>v.y)), maxY=Math.max(...meterVals.map(v=>v.y)); const midX=(minX+maxX)/2, midY=(minY+maxY)/2; const entM=toMeters(points.ENT);
