      offset:[0,-10],

let points=JSON.parse(JSON.stringify(defaultPoints));
const coordStatus=document.getElementById('coordStatus');
try{
  const raw=localStorage.getItem('shanghai_disney_verified_points_v1');
  if(raw){
    const verified=JSON.parse(raw);
    Object.keys(defaultPoints).forEach((k)=>{
      if(verified[k]&&typeof verified[k].lat==='number'&&typeof verified[k].lng==='number'){ points[k].lat=verified[k].lat; points[k].lng=verified[k].lng; }
    });
    if(coordStatus) coordStatus.textContent='좌표 상태: 검증 좌표 적용됨 (좌표 검증기 저장값)';
  }
}catch(_){ if(coordStatus) coordStatus.textContent='좌표 상태: 기본 추정 좌표 (검증 좌표 로드 실패)'; }

try{
  const rawPins=localStorage.getItem(CALIBRATION_PIN_KEY);
  if(rawPins){
    const pinList=JSON.parse(rawPins);
    const byId=Object.fromEntries((Array.isArray(pinList)?pinList:[]).map((p)=>[p.id,p]));
    ['ENT','MAV','WSL','PIR','EXPC','SOA','CAMP','ZOO','TRN','BLPR','PPF','REX','ALI','GDN','LFF','AMA','FFR','DBL','IGI'].forEach((k)=>{ if(byId[k]&&points[k]){ points[k].lat=byId[k].lat; points[k].lng=byId[k].lng; } });
    if(byId.WOD){ points.WOD.lat=byId.WOD.lat; points.WOD.lng=byId.WOD.lng; }
    if(byId.DTN){ points.WOD.lat=byId.DTN.lat; points.WOD.lng=byId.DTN.lng; }
  }
}catch(_){ }

  ['上海迪士尼??','Shanghai Disneyland (Main Entrance)'],['迪士尼小?','Disneytown'],['星愿湖','Wishing Star Lake'],['世界商店','World of Disney Store'],['米奇大街','Mickey Avenue'],['奇想花?','Gardens of Imagination'],['?藏?','Treasure Cove'],['探??','Adventure Isle'],['探?家?木舟','Explorer Canoes'],['?翔·?越地平?','Soaring Over the Horizon'],['古迹探索?','Camp Discovery'],['?幻世界','Fantasyland'],['小??天空奇遇',"Peter Pan's Flight"],['????游仙境迷?','Alice in Wonderland Maze'],['迪士尼·皮克斯玩具???','Toy Story Land'],['抱抱??天??',"Rex's Racers"],['明日世界','Tomorrowland'],['巴斯光年星??救','Buzz Lightyear Planet Rescue'],['?狂?物城','Zootopia'],['??船奇?','Doubloon Market'],['星??易港','Intergalactic Imports'],['妙趣无???店','Fashions by Fru Fru']
];
let customDictionary=[];
try{ const raw=localStorage.getItem(CUSTOM_DICT_KEY); if(raw) customDictionary=JSON.parse(raw); if(!Array.isArray(customDictionary)) customDictionary=[]; }catch(_){ customDictionary=[]; }
function matchByDictionary(zhText){ if(!zhText) return null; const all=[...customDictionary,...baseDictionary]; return all.find((x)=>zhText.includes(x.zh))||null; }
function hasChinese(v){ return /[\u3400-\u9FFF]/.test(String(v||'')); }
function manualTranslateZhToEn(zh){ const text=String(zh||'').trim(); if(!text) return ''; const e=manualZhEnMap.find(([k])=>text===k); if(e) return e[1]; const i=manualZhEnMap.find(([k])=>text.includes(k)); return i?i[1]:''; }
function sanitizeEnglish(zh,enCandidate){ const c=String(enCandidate||'').trim(); const l=c.toLowerCase(); if(l.includes('hill of festival')) return 'Festival Forest'; if(c&&!hasChinese(c)&&l!=='no match'&&l!=='unknown poi'&&l!=='needs manual translation') return c; const m=manualTranslateZhToEn(zh); const out=m||'Unknown POI'; return String(out).toLowerCase().includes('hill of festival')?'Festival Forest':out; }

function meters(a,b){ const R=6371000; const toRad=d=>d*Math.PI/180; const dLat=toRad(b.lat-a.lat), dLng=toRad(b.lng-a.lng), lat1=toRad(a.lat), lat2=toRad(b.lat); const h=Math.sin(dLat/2)**2+Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLng/2)**2; return 2*R*Math.asin(Math.sqrt(h)); }
function metersLL(a,b){ return meters({lat:a[0],lng:a[1]},{lat:b[0],lng:b[1]}); }
function parseHmFromLabel(label){
  const m=String(label||'').match(/(\d{1,2}):(\d{2})/);
  if(!m) return null;
  return Number(m[1])*60+Number(m[2]);
}
function routeWindow(route){
  let start=null,end=null,startText='',endText='';
  route.forEach((r)=>{
    const txt=String(r.label||'').match(/(\d{1,2}:\d{2})/);
    const m=parseHmFromLabel(r.label);
    if(m===null) return;
    if(start===null){ start=m; startText=txt?txt[1]:''; }
    end=m; endText=txt?txt[1]:'';
  });
  if(start===null||end===null) return null;
  let diff=end-start;
  if(diff<0) diff+=24*60;
  return {startText,endText,diff};
}
function legPolyline(aKey,bKey){
  const ab=`${aKey}>${bKey}`;
  const ba=`${bKey}>${aKey}`;
  if(walkLegs[ab]) return walkLegs[ab].slice();
  if(walkLegs[ba]) return walkLegs[ba].slice().reverse();
  return [];
}
function buildWalkPolyline(route){
  const out=[];
  route.forEach((r,i)=>{
    const p=points[r.key];
    if(i===0){ out.push([p.lat,p.lng]); return; }
    const prev=route[i-1];
    const mids=legPolyline(prev.key,r.key);
    mids.forEach((m)=>out.push(m));
    out.push([p.lat,p.lng]);
  });
  return out;
}
function polylineDistance(latlngs){
  let d=0;
  for(let i=0;i<latlngs.length-1;i++) d+=metersLL(latlngs[i],latlngs[i+1]);
  return d;
}
function nearestKnownPoint(lat,lng){ let best=null; Object.values(points).forEach((p)=>{ const d=meters({lat,lng},p); if(!best||d<best.d) best={d,p}; }); return best&&best.d<=220?best.p:null; }

const MATCH_LOG_KEY='shanghai_disney_click_match_log_v1';
const NEEDS_KEY='shanghai_disney_needs_matching_v1';
let clickLogs=[],needsMatching=[];
function normalizeName(v){ return String(v||'').replace(/\s+/g,' ').trim().toLowerCase(); }
function dedupeNeedsByName(){ const seen=new Map(); needsMatching.forEach((n)=>{ const k=normalizeName(n.zh); if(!k) return; if(!seen.has(k)){ seen.set(k,n); return; } const p=seen.get(k); seen.set(k,(n.ts||'')>(p.ts||'')?n:p); }); needsMatching=[...seen.values()]; }
function nowKst(){ const d=new Date(); const kst=new Date(d.getTime()+(9*60+d.getTimezoneOffset())*60000); return kst.toISOString().replace('T',' ').slice(0,19); }
function loadLogs(){ try{ clickLogs=JSON.parse(localStorage.getItem(MATCH_LOG_KEY)||'[]'); needsMatching=JSON.parse(localStorage.getItem(NEEDS_KEY)||'[]'); dedupeNeedsByName(); needsMatching=needsMatching.map((x)=>({...x,en:sanitizeEnglish(x.zh,x.en)})); clickLogs=clickLogs.map((x)=>({...x,en:sanitizeEnglish(x.zh,x.en)})); }catch(_){ clickLogs=[]; needsMatching=[]; } }
function saveLogs(){ localStorage.setItem(MATCH_LOG_KEY,JSON.stringify(clickLogs)); localStorage.setItem(NEEDS_KEY,JSON.stringify(needsMatching)); }
function renderLogLists(){
  const matchLogEl=document.getElementById('matchLog'); const needsEl=document.getElementById('needsList');
  matchLogEl.innerHTML=clickLogs.length?clickLogs.slice(0,20).map((x)=>`<li><b>${x.result}</b> | 중문: ${x.zh}<br>한글: ${x.ko}<br>영문: ${sanitizeEnglish(x.zh,x.en)}<br><span style="color:#6b7280">${x.ts} | ${x.lat.toFixed(5)}, ${x.lng.toFixed(5)}</span></li>`).join(''):'<li>아직 클릭 기록이 없습니다.</li>';
  needsEl.innerHTML=needsMatching.length?needsMatching.slice(0,20).map((x)=>`<li>중문: ${x.zh}<br>영문: ${sanitizeEnglish(x.zh,x.en)}<br>좌표: ${x.lat.toFixed(5)}, ${x.lng.toFixed(5)}<br><span style="color:#6b7280">${x.ts}</span></li>`).join(''):'<li>현재 미매칭 항목 없음</li>';
}
function addLogEntry(entry){ entry.en=sanitizeEnglish(entry.zh,entry.en); clickLogs.unshift(entry); if(clickLogs.length>200) clickLogs=clickLogs.slice(0,200); if(entry.result==='미매칭'){ const k=normalizeName(entry.zh); const idx=needsMatching.findIndex((x)=>normalizeName(x.zh)===k); if(idx>=0){ needsMatching[idx]={...needsMatching[idx],ko:entry.ko,en:entry.en,lat:entry.lat,lng:entry.lng,ts:entry.ts}; const up=needsMatching.splice(idx,1)[0]; needsMatching.unshift(up); } else { needsMatching.unshift({zh:entry.zh,ko:entry.ko,en:entry.en,lat:entry.lat,lng:entry.lng,ts:entry.ts}); } if(needsMatching.length>200) needsMatching=needsMatching.slice(0,200);} saveLogs(); renderLogLists(); }

const GEO_GAP_MS=900, GEO_BLOCK_MS=120000; let geoLastAt=0, geoBlockedUntil=0; const geoCache=new Map();
async function reverseGeocode(lat,lng,lang){ const now=Date.now(); if(now<geoBlockedUntil) return {__forbidden:true,__cooldown:true}; const key=`${lang}|${lat.toFixed(5)}|${lng.toFixed(5)}`; if(geoCache.has(key)) return geoCache.get(key); const wait=GEO_GAP_MS-(now-geoLastAt); if(wait>0) await new Promise((r)=>setTimeout(r,wait)); geoLastAt=Date.now(); const url=`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1&namedetails=1&accept-language=${lang}`; const res=await fetch(url,{headers:{'Accept':'application/json'}}); if(res.status===403){ geoBlockedUntil=Date.now()+GEO_BLOCK_MS; return {__forbidden:true}; } if(!res.ok) return {__error:true}; const data=await res.json(); geoCache.set(key,data); return data; }
function pointTypeByKey(key){
  const k=String(key||'').toUpperCase();
  if(['AMA','WOD','FFR','DBL','IGI'].includes(k)) return 'shop';
  if(['PIR','EXPC','SOA','CAMP','ZOO','TRN','BLPR','PPF','REX','ALI','SDMT'].includes(k)) return 'attraction';
  return 'other';
}
function markerSizeByKey(key){
  const k=String(key||'').toUpperCase();
  if(k==='AMA') return 26;
  return 34;
}
function markerIcon(num,alt=false,key='',labelText=''){
  const k=String(key||'').toUpperCase();
  if(['AMA','ENT','WSL'].includes(k)){
    const t = labelText || (k==='ENT' ? '입구' : (k==='WSL' ? '호수' : 'AMA'));
    return L.divIcon({
      className:'',
      html:`<div class="pin-label-only">${t}</div>`,
      iconSize:[38,20],
      iconAnchor:[19,10]
    });
  }
  const t=pointTypeByKey(key);
  const shape=t==='shop'?'shape-shop':(t==='attraction'?'shape-attraction':'');
  const sz=markerSizeByKey(key);
  const bg = k==='WOD' ? '#d1d5db' : (alt ? '#b45309' : '#0f766e');
  return L.divIcon({
    className:'',
    html:`<div class="pin ${shape}" style="width:${sz}px;height:${sz}px;background:${bg}"><span>${num}</span></div>`,
    iconSize:[sz,sz],
    iconAnchor:[Math.round(sz/2),Math.round(sz/2)]
  });
}
let layerGroup=L.layerGroup().addTo(map);
const poiLayer=L.layerGroup().addTo(map);
function renderPoiMarkers(){
  poiLayer.clearLayers();
  [
    {key:'MAV',tag:'MAV'},
    {key:'WSL',tag:'LAKE'},
    {key:'WOD',tag:'WOD'},
    {key:'BLPR',tag:'BLPR'},
    {key:'PPF',tag:'PPF'},
    {key:'EXPC',tag:'EXPC'},
    {key:'SOA',tag:'SOA'},
    {key:'CAMP',tag:'CAMP'},
    {key:'REX',tag:'REX'},
    {key:'ALI',tag:'ALI'}
  ].forEach((v)=>{
    const p=points[v.key];
    if(!p) return;
    const t=pointTypeByKey(v.key);
    const shape=t==='shop'?'shape-shop':(t==='attraction'?'shape-attraction':'');
    const bg = String(v.key||'').toUpperCase()==='WOD' ? '#d1d5db' : '#1d4ed8';
    L.marker([p.lat,p.lng],{
      icon:L.divIcon({
        className:'',
        html:`<div class="pin ${shape}" style="background:${bg};font-size:8px"><span>${v.tag}</span></div>`,
        iconSize:[34,34],
        iconAnchor:[17,17]
      })
    })
      .bindPopup(`<b>${p.name}</b><br>${p.note}<br><span style="color:#6b7280">${p.lat.toFixed(5)}, ${p.lng.toFixed(5)}</span>`)
      .addTo(poiLayer);
  });
}
function spreadOverlaps(route){
  const groups=new Map();
  route.forEach((r,i)=>{
    const key=r.key;
    if(!groups.has(key)) groups.set(key,[]);
    groups.get(key).push(i);
  });
  const out=route.map((r)=>({key:r.key,label:r.label,nameOverride:r.nameOverride,lat:points[r.key].lat,lng:points[r.key].lng}));
  groups.forEach((idxs)=>{
    if(idxs.length<=1) return;
    const radius=0.00010;
    idxs.forEach((idx,k)=>{
      const angle=(2*Math.PI*k)/idxs.length;
      out[idx].lat=out[idx].lat + radius*Math.sin(angle);
      out[idx].lng=out[idx].lng + radius*Math.cos(angle);
    });
  });
  return out;
}
function renderRoute(route,isAlt){
  layerGroup.clearLayers();
  const expanded=spreadOverlaps(route);
  const latlngs=expanded.map((r)=>[r.lat,r.lng]);
  L.polyline(latlngs,{color:isAlt?'#b45309':'#0f766e',weight:6,opacity:.9,dashArray:isAlt?'8 8':null}).addTo(layerGroup);
  expanded.forEach((r,i)=>{
    const p=points[r.key];
    const displayName=r.nameOverride||p.name;
    const m=L.marker([r.lat,r.lng],{icon:markerIcon(i+1,isAlt,r.key,displayName)}).bindPopup(`<b>${i+1}. ${displayName}</b><br>${r.label}<br>${p.note}`).addTo(layerGroup);
    if(!['AMA','ENT','WSL'].includes(String(r.key||'').toUpperCase())){
      m.bindTooltip(`${i+1}. ${displayName}`,{direction:'top',offset:[0,-20],permanent:true,className:'zone-tip'});
    }
  });
  let total=0; for(let i=0;i<route.length-1;i++){ total+=meters(points[route[i].key],points[route[i+1].key]); }
  const km=(total/1000).toFixed(2);
  const walkMin=Math.round(total/53.3); // about 3.2km/h
  const rw=routeWindow(route);
  const planLine=rw?`계획표 총 소요(대기/탑승/휴식 포함): <b>${Math.floor(rw.diff/60)}시간 ${rw.diff%60}분</b> (${rw.startText}~${rw.endText})`:'계획표 총 소요: <b>시간표 미정</b>';
  document.getElementById('metric').innerHTML=`${planLine}<br>총 이동거리(직선합): <b>${km} km</b> | 순수 도보 추정 <b>${walkMin}분</b><br>랜드 점프: <b>${Math.max(route.length-2,0)}회</b> | ${isAlt?'쇼 생략/쇼핑 마감형 루트':'일루미네이션 관람형 루트'}`;
  document.getElementById('steps').innerHTML=route.map((r,i)=>{ const p=points[r.key]; const displayName=r.nameOverride||p.name; return `<li><span class="n">${i+1}</span><div class="step-card"><b>${displayName}</b><br>${r.label}<br>좌표: ${p.lat.toFixed(5)}, ${p.lng.toFixed(5)}</div></li>`; }).join('');
  map.fitBounds(L.latLngBounds(latlngs),{padding:[30,30]});
}

document.getElementById('btnA').addEventListener('click',()=>{ document.getElementById('btnA').classList.add('active'); document.getElementById('btnB').classList.remove('active'); renderRoute(routeA,false); });
document.getElementById('btnB').addEventListener('click',()=>{ document.getElementById('btnB').classList.add('active'); document.getElementById('btnA').classList.remove('active'); renderRoute(routeB,true); });
function toNeedsCsv(){ const head='zh,ko,en,lat,lng,timestamp_kst'; const lines=needsMatching.map((x)=>`"${(x.zh||'').replaceAll('"','""')}","${(x.ko||'').replaceAll('"','""')}","${(x.en||'').replaceAll('"','""')}",${x.lat},${x.lng},${x.ts}`); return [head,...lines].join('\n'); }
async function copyText(text,msg){ try{ await navigator.clipboard.writeText(text); alert(msg); }catch(_){ alert('복사 실패. 브라우저 권한을 확인해 주세요.'); } }
document.getElementById('copyNeedsCsv').addEventListener('click',()=>copyText(toNeedsCsv(),'미매칭 CSV를 복사했습니다.'));
document.getElementById('copyNeedsJson').addEventListener('click',()=>copyText(JSON.stringify(needsMatching,null,2),'미매칭 JSON을 복사했습니다.'));
document.getElementById('clearLogs').addEventListener('click',()=>{ if(!confirm('클릭 로그/미매칭 리스트를 모두 초기화할까요?')) return; clickLogs=[]; needsMatching=[]; saveLogs(); renderLogLists(); });

map.on('click',async(e)=>{
  const {lat,lng}=e.latlng;
  const popup=L.popup({maxWidth:240,autoPanPadding:[10,10]}).setLatLng([lat,lng]).setContent('지명 조회 중...').openOn(map);
  try{
    const [zhData,enData]=await Promise.all([reverseGeocode(lat,lng,'zh-CN'),reverseGeocode(lat,lng,'en')]);
    if(zhData?.__forbidden||enData?.__forbidden){ popup.setContent('<b>조회 제한(403)</b><br><span style="color:#6b7280">잠시 후 다시 시도</span>'); return; }
    if(zhData?.__error||enData?.__error){ popup.setContent('<b>조회 불안정</b><br><span style="color:#6b7280">네트워크 재시도</span>'); return; }
    const zhName=zhData?.namedetails?.name||zhData?.name||zhData?.address?.attraction||zhData?.address?.tourism||zhData?.display_name||'중국어 지명 미확인';
    const enName=enData?.namedetails?.name||enData?.name||enData?.address?.attraction||enData?.address?.tourism||enData?.display_name||'Unknown POI';
    const dict=matchByDictionary(zhName)||matchByDictionary(zhData?.display_name||'');
    const near=nearestKnownPoint(lat,lng);
    const koText=dict?dict.ko:(near?near.name:'매칭 없음');
    const enText=dict?dict.en:sanitizeEnglish(zhName,enName || (near?near.name:''));
    const isMatched=!!dict;
    addLogEntry({result:isMatched?'매칭완료':'미매칭',zh:zhName,ko:koText,en:enText,lat,lng,ts:nowKst()});
    popup.setContent(`<b>클릭 지점 지명</b><br>중국어: ${zhName}<br>한국어: ${koText}<br>영어: ${enText}<br><span style="color:#6b7280">좌표: ${lat.toFixed(5)}, ${lng.toFixed(5)}</span>`);
  }catch(_){
    const near=nearestKnownPoint(lat,lng);
    addLogEntry({result:'미매칭',zh:'중국어 지명 미확인(조회실패)',ko:near?near.name:'매칭 없음',en:near?near.name:'Unknown POI',lat,lng,ts:nowKst()});
    popup.setContent(`<b>지명 조회 실패</b><br>네트워크 또는 지오코딩 제한<br>한국어 추정: ${near?near.name:'매칭 없음'}<br><span style="color:#6b7280">좌표: ${lat.toFixed(5)}, ${lng.toFixed(5)}</span>`);
  }
});

loadLogs(); renderLogLists(); renderRoute(routeA,false); renderPoiMarkers();
